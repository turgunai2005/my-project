<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Todo List</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:50px;
}

input{
padding:10px;
width:200px;
}

button{
padding:10px;
margin-left:5px;
}

.delete{
background:red;
color:white;
border:none;
padding:5px 10px;
margin-left:10px;
}

li{
margin:10px;
}
</style>

</head>

<body>

<h2>My Todo List</h2>

<input id="task" placeholder="Жаз...">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
function addTask(){
let text=document.getElementById("task").value;

if(text==="") return;

let li=document.createElement("li");
li.innerHTML=text + " <button class='delete' onclick='this.parentElement.remove()'>Delete</button>";

document.getElementById("list").appendChild(li);

document.getElementById("task").value="";
}
</script>

</body>
</html>
